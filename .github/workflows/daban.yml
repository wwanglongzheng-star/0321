name: 打板选股系统 v9.5

# ─────────────────────────────────────────────────────────────────
# 【触发策略】v3.1 增强版
#   1. 主 cron：UTC 00:50（北京 08:50）—— 集合竞价前启动
#   2. 备用 cron：UTC 01:10（北京 09:10）—— 防止主 cron 被 GitHub 延迟
#   3. 补救 cron：UTC 01:30（北京 09:30）—— 进一步兜底，确保开盘推送
#   4. 手动触发：随时可测试
# 注意：GitHub Actions schedule 存在最多 10~30min 延迟，多档触发互为补充
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    # 主触发：UTC 00:50 = 北京时间 08:50，集合竞价前到位
    - cron: "50 0 * * 1-5"
    # 备用触发：UTC 01:10 = 北京时间 09:10，防止主 cron 延迟
    - cron: "10 1 * * 1-5"
    # 补救触发：UTC 01:30 = 北京时间 09:30，开盘后兜底
    - cron: "30 1 * * 1-5"

  workflow_dispatch:
    inputs:
      test_mode:
        description: "测试模式（1=推送测试消息后退出，0=正常全天运行）"
        required: false
        default: "0"
      manual_trigger:
        description: "手动触发标记（1=跳过收盘/非交易日限制，直接扫描）"
        required: false
        default: "1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daban-select:
    name: 打板选股（全天守护 v9.5）
    runs-on: ubuntu-latest
    # 08:50 启动 → 15:35 收盘 = 6.75h = 405min + 环境准备 10min
    timeout-minutes: 420
    # ★ 并发控制：同一天多 cron 触发时，只保留最新的一个运行实例
    # group 按日期命名，同一天内若已有实例运行则跳过新触发（避免重复运行）
    # 手动触发(workflow_dispatch)使用独立 group，不受 cron 实例限制
    concurrency:
      group: daban-daily-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'scheduled' }}-${{ github.workflow }}
      cancel-in-progress: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行打板选股（全天循环）
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          SENDKEY2: ${{ secrets.SENDKEY2 }}
          TEST_MODE: ${{ github.event.inputs.test_mode || '0' }}
          MANUAL_TRIGGER: ${{ github.event.inputs.manual_trigger || '0' }}
        # timeout 23400秒 = 390分钟，双重保险防止死循环
        run: |
          if [ "$TEST_MODE" = "1" ]; then
            python daban_selector.py --test-push
          else
            timeout 23400 python daban_selector.py || true
          fi

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daban-log-${{ github.run_number }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 7
