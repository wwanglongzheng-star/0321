name: Trading Bot
on:
  schedule:
    - cron: '20 1 * * 1-5'
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python run.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
