name: A股自动选股
on:
  workflow_dispatch:
  schedule:
    - cron: '10 1 * * 1-5'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run stock bot
        run: python run.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
